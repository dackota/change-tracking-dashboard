name: Release

# Publishes the multi-arch container image and the Helm chart to GitHub's
# free registry (ghcr.io) so the homelab GitOps repo can pull both.
#
# - Image  -> ghcr.io/<owner>/change-tracking-dashboard
# - Chart  -> oci://ghcr.io/<owner>/charts/change-tracking-dashboard
#
# The image is tagged with the chart's appVersion, which the chart's image
# helper (image.tag | default .Chart.AppVersion) uses by default — so the
# GitOps repo pins a version once (chart dependency version) and the image
# tag follows automatically. Bump version/appVersion in the chart's Chart.yaml
# to cut a new release.
#
# Auth uses the built-in GITHUB_TOKEN (packages: write) — no secrets to manage.
#
# Every `uses:` is pinned to a full commit SHA (supply-chain hardening on a
# packages:write workflow): a repointed upstream tag can't exfiltrate the token
# or push a malicious artifact. The trailing comment records the major tag;
# bump via Dependabot/Renovate.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/change-tracking-dashboard
  CHART_DIR: deploy/helm/change-tracking-dashboard
  CHART_OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # appVersion becomes the image tag (the chart's image helper defaults
      # image.tag to .Chart.AppVersion). The chart package version is read by
      # `helm package` directly from Chart.yaml, so only appVersion is needed here.
      - name: Read chart appVersion
        id: chart
        run: |
          set -euo pipefail
          appVersion=$(grep '^appVersion:' "$CHART_DIR/Chart.yaml" | head -1 | awk '{print $2}' | tr -d '"')
          # appVersion is used verbatim as a Docker image tag, so it must be a
          # valid tag: start alphanumeric, then [A-Za-z0-9_.-]. This deliberately
          # rejects SemVer build-metadata ("+", e.g. 0.2.0+build) — invalid in a
          # tag and inconsistent with the chart's image helper — as well as any
          # multiline/injected value, failing fast with a clear message instead
          # of a cryptic push error.
          [[ "$appVersion" =~ ^[A-Za-z0-9][A-Za-z0-9_.-]*$ ]] \
            || { echo "appVersion '$appVersion' is not a valid Docker image tag"; exit 1; }
          echo "appVersion=$appVersion" >> "$GITHUB_OUTPUT"
          echo "Chart appVersion=$appVersion"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to ghcr
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.chart.outputs.appVersion }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push image (amd64 + arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Package + push chart
        # Token stays an env var — never interpolated into the script text, so
        # it isn't written verbatim into the generated shell script on disk.
        env:
          HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$HELM_REGISTRY_PASSWORD" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          helm package "$CHART_DIR" --destination /tmp/chart
          helm push /tmp/chart/change-tracking-dashboard-*.tgz "$CHART_OCI_REPO"
