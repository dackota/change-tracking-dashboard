name: Release

# Publishes the multi-arch container image and the Helm chart to GitHub's
# free registry (ghcr.io) so the homelab GitOps repo can pull both.
#
# - Image  -> ghcr.io/<owner>/change-tracking-dashboard
# - Chart  -> oci://ghcr.io/<owner>/charts/change-tracking-dashboard
#
# The image is tagged with the chart's appVersion, which the chart's image
# helper (image.tag | default .Chart.AppVersion) uses by default — so the
# GitOps repo pins a version once (chart dependency version) and the image
# tag follows automatically. Bump version/appVersion in the chart's Chart.yaml
# to cut a new release.
#
# Auth uses the built-in GITHUB_TOKEN (packages: write) — no secrets to manage.
#
# Supply-chain hardening on a packages:write workflow:
#   - every `uses:` is pinned to a full commit SHA (a repointed upstream tag
#     can't exfiltrate the token or push a malicious artifact; trailing comment
#     records the major/version tag — bump via Dependabot/Renovate);
#   - base images are digest-pinned in the Dockerfile;
#   - Trivy scans the built image and fails the release on HIGH/CRITICAL vulns
#     BEFORE anything is pushed;
#   - the ghcr owner is lowercased (ghcr/OCI repo paths must be lowercase).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHART_DIR: deploy/helm/change-tracking-dashboard

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Compute the ghcr image name + chart OCI repo from a LOWERCASED owner
      # (ghcr/OCI require lowercase repo paths; github.repository_owner can
      # contain uppercase for some accounts/orgs), and read the chart appVersion.
      # appVersion becomes the image tag (the chart's image helper defaults
      # image.tag to .Chart.AppVersion); the chart package version is read by
      # `helm package` directly from Chart.yaml, so only appVersion is needed here.
      # IMAGE_NAME/CHART_OCI_REPO are exported to $GITHUB_ENV for later steps
      # (env: can't reference a step output, so they're computed here, not at top).
      - name: Compute refs + read chart appVersion
        id: chart
        run: |
          set -euo pipefail
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${owner}/change-tracking-dashboard" >> "$GITHUB_ENV"
          echo "CHART_OCI_REPO=oci://${REGISTRY}/${owner}/charts" >> "$GITHUB_ENV"
          appVersion=$(grep '^appVersion:' "$CHART_DIR/Chart.yaml" | head -1 | awk '{print $2}' | tr -d '"')
          # appVersion is used verbatim as a Docker image tag, so it must be a
          # valid tag: start alphanumeric, then [A-Za-z0-9_.-]. This deliberately
          # rejects SemVer build-metadata ("+", e.g. 0.2.0+build) — invalid in a
          # tag and inconsistent with the chart's image helper — as well as any
          # multiline/injected value, failing fast with a clear message instead
          # of a cryptic push error.
          [[ "$appVersion" =~ ^[A-Za-z0-9][A-Za-z0-9_.-]*$ ]] \
            || { echo "appVersion '$appVersion' is not a valid Docker image tag"; exit 1; }
          echo "appVersion=$appVersion" >> "$GITHUB_OUTPUT"
          echo "owner=${owner} appVersion=${appVersion}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to ghcr
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build a single-arch (amd64) image and load it locally so Trivy can scan
      # it BEFORE anything is pushed. The Go module deps (read from the compiled
      # binary) and the distroless base are identical across arches, so the amd64
      # image is representative; the multi-arch build+push below reuses this
      # build's layer cache (type=gha).
      - name: Build image for scanning (amd64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy) — fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.chart.outputs.appVersion }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Build and push image (amd64 + arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Package + push chart
        # Token stays an env var — never interpolated into the script text, so
        # it isn't written verbatim into the generated shell script on disk.
        env:
          HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$HELM_REGISTRY_PASSWORD" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          helm package "$CHART_DIR" --destination /tmp/chart
          helm push /tmp/chart/change-tracking-dashboard-*.tgz "$CHART_OCI_REPO"
