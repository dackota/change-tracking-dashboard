name: Renovate

# Scheduled self-hosted Renovate runner, replacing Dependabot (see
# renovate.json at the repo root for the base config). Mints a short-lived
# GitHub App (dk-renovate-bot) installation token so Renovate's commits/PRs
# are attributed to the App — not GITHUB_TOKEN — which lets its PRs trigger
# downstream workflows and be auto-merged by the App later in the pipeline
# (this repo has no branch protection on the free plan, so auto-merge has to
# go through App-authored PRs, not a protection gate).
#
# Hardening:
#   - every `uses:` is pinned to a full commit SHA (trailing comment records
#     the version tag);
#   - permissions default to `contents: read` — Renovate authenticates against
#     GitHub with the minted App token, so the workflow's own GITHUB_TOKEN
#     never needs write access;
#   - RENOVATE_REPOSITORIES pins the run to this repo only, so the (shared)
#     App installation on the gitops repo can't leak into this schedule.
#
# Dependency Dashboard / PR checkboxes (dependencyDashboard: true in
# renovate.json): checking a box only changes issue/PR *state* — it does not
# itself run Renovate. The hosted Mend app reacts to that state change via a
# webhook the instant it happens; a self-hosted runner like this one only
# reacts on its own trigger, so without the two event triggers below, a
# checked box (dashboard "run again"/approve/unignore, or a PR's
# rebase/retry checkbox) would just sit there until the next 05:00 UTC
# cron. `issues`/`pull_request` `edited` covers that: the job's `if:` below
# still gates on schedule/workflow_dispatch/the Dashboard issue/Renovate's
# own PRs, so unrelated issue and PR edits elsewhere in the repo don't
# trigger a run.

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
  issues:
    types: [edited]
  pull_request:
    types: [edited]

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    # Only react to an issue/PR edit when it's actually a Renovate checkbox:
    # the Dependency Dashboard issue (title must match
    # dependencyDashboardTitle in renovate.json -- default "Dependency
    # Dashboard", update both together if it's ever customized), or a PR
    # opened by the renovate bot App.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.issue.title == 'Dependency Dashboard') ||
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dk-renovate-bot[bot]')
    steps:
      - name: Generate a token for the dk-renovate-bot App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Run Renovate
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: debug
          LOG_FORMAT: json
          # Attribute Renovate's commits/PRs to the App bot instead of the
          # action's default "renovate-bot" identity. The email must use the
          # App bot's numeric user id (resolved via
          # `gh api users/dk-renovate-bot%5Bbot%5D`) for GitHub to recognize
          # it as a real account and render the App's avatar on the commit.
          RENOVATE_GIT_AUTHOR: "dk-renovate-bot[bot] <300303047+dk-renovate-bot[bot]@users.noreply.github.com>"
        with:
          token: ${{ steps.app-token.outputs.token }}
