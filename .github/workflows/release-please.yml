name: Release Please

# Single-component release-please for this repo, running in manifest mode
# from release-please-config.json / .release-please-manifest.json at the
# repo root:
#   - app (path ".", tagged app-v*) -> cmd/, internal/, go.mod, go.sum,
#     Dockerfile.
#
# On every push to main, release-please-action opens/updates the app's
# release PR (separate-pull-requests: true in the config) whose squash
# commit becomes the release. Once it has created/updated the release PR,
# this workflow turns on GitHub-native auto-merge for it and lets GitHub
# merge it once CI is green.
#
# Native auto-merge only actually waits for checks that a branch rule has
# marked required -- without such a gate it would merge immediately instead
# of waiting (R33). This repo is public, so the "main: require CI
# (auto-merge gate)" ruleset supplies that gate: `gh pr merge --auto`
# enables auto-merge and GitHub holds the PR until pr-ci.yml /
# pr-title-lint.yml pass. (An earlier revision polled the check-runs API and
# merged by hand, because the repo was then private with no branch
# protection to gate on; the ruleset replaces that polling.)
#
# Both steps authenticate as the dk-renovate-bot GitHub App, not
# GITHUB_TOKEN, because GitHub does not let actions performed by the
# default GITHUB_TOKEN trigger further workflow runs (its anti-recursion
# rule):
#   - release-please-action needs the App token so the release PR it opens
#     is App-authored and its `pull_request` event actually dispatches
#     pr-ci.yml / pr-title-lint.yml -- with GITHUB_TOKEN those required
#     checks would simply never run;
#   - enabling auto-merge needs the App token for the same reason on the
#     other end: native auto-merge attributes the eventual merge-to-main push
#     to whoever enabled it, and a GITHUB_TOKEN-authored push would not
#     re-trigger this `on: push` workflow, so release-please-action would
#     never get a chance to notice the release PR was merged and cut the tag
#     + GitHub Release that the publish workflow (next slice) listens for.
#
# Labeling is left on. `skip-labeling: true` was tried initially to avoid
# widening the App's permission set, but release-please-action also uses
# the `autorelease: pending` label *internally* to find its own already-open
# release PR on each run -- not just for this workflow's merge step, which
# only reads the action's own `prs` output. With labeling skipped, every run
# while a release PR is still open failed to find it and tried to open a
# duplicate on the same branch, erroring the whole job before the merge step
# ever ran (observed on `dackota/change-tracking-dashboard` PR #37). Fixed by
# granting the App `issues: write` and dropping `skip-labeling`.
#
# Hardening:
#   - every `uses:` is pinned to a full commit SHA (trailing comment records
#     the version tag);
#   - permissions default to `contents: read` -- both release-please-action
#     and the merge step authenticate with the minted App token, so the
#     workflow's own GITHUB_TOKEN never needs write access;
#   - the merge is always an explicit squash (`--squash`) rather than
#     relying on the repo's merge-strategy setting: the auto-merge ruleset
#     requires checks but does not pin the merge method, so passing
#     `--squash` keeps every release a single squash commit (see
#     pr-title-lint.yml's note).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate a token for the dk-renovate-bot App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Turn on GitHub-native auto-merge for each release PR this run
      # touched; the auto-merge ruleset holds the PR until pr-ci.yml /
      # pr-title-lint.yml pass, then GitHub merges it -- no polling here,
      # GitHub owns the wait. `steps.release.outputs.prs` is a JSON array of
      # PullRequest objects (unset/"[]" when nothing was created or updated
      # this run, guarded by the `if:` below and re-checked in-script).
      - name: Enable auto-merge on release PR(s)
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          # This job never runs actions/checkout, so `gh pr merge` has no
          # local repo to infer the target from -- pin it with --repo or it
          # fails with "fatal: not a git repository".

          if [ -z "$PRS_JSON" ] || [ "$PRS_JSON" = "[]" ]; then
            echo "No release PRs created or updated this run; nothing to merge."
            exit 0
          fi

          echo "$PRS_JSON" | jq -r '.[].number' | while read -r number; do
            echo "::group::release PR #$number"
            # --squash is required because the repo allows more than one merge
            # method; --auto enables native auto-merge so GitHub merges once
            # the required checks pass.
            if gh pr merge "$number" --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch; then
              echo "auto-merge enabled for #$number"
            else
              # `--auto` is rejected when the PR is already mergeable (checks
              # already green, nothing left to wait on) -- fall back to
              # merging it now.
              echo "auto-merge not enabled for #$number; attempting a direct squash merge"
              gh pr merge "$number" --repo "$GITHUB_REPOSITORY" --squash --delete-branch \
                || echo "::warning::could not merge release PR #$number -- leaving it open for a later run or manual merge"
            fi
            echo "::endgroup::"
          done
