name: Release Please

# Two-component release-please for this repo, running in manifest mode from
# release-please-config.json / .release-please-manifest.json at the repo
# root:
#   - app   (path ".", tagged app-v*)   -> cmd/, internal/, go.mod, go.sum,
#     Dockerfile; its release writes appVersion in the chart's Chart.yaml
#     via an `extra-files` annotation updater.
#   - chart (path deploy/helm/change-tracking-dashboard, tagged chart-v*)
#     -> its release writes the package `version` in the same Chart.yaml.
#
# On every push to main, release-please-action opens/updates a release PR
# per component (separate-pull-requests: true in the config) whose squash
# commit becomes that component's release. Once it has created/updated a
# release PR, this workflow waits for that PR's required CI (pr-ci.yml,
# pr-title-lint.yml) to go green and merges it itself.
#
# Why a self-driven merge instead of GitHub's native auto-merge: this repo
# is private on the free plan, so there is no branch protection to hang
# `gh pr merge --auto`/platform auto-merge off of -- native auto-merge only
# actually waits for checks that branch protection has marked required, and
# without branch protection it would just merge immediately instead of
# waiting (R33). So the workflow watches the checks itself and performs a
# real, immediate `gh pr merge` once they pass.
#
# Both steps authenticate as the dk-renovate-bot GitHub App, not
# GITHUB_TOKEN, because GitHub does not let actions performed by the
# default GITHUB_TOKEN trigger further workflow runs (its anti-recursion
# rule):
#   - release-please-action needs the App token so the release PR it opens
#     is App-authored and its `pull_request` event actually dispatches
#     pr-ci.yml / pr-title-lint.yml -- with GITHUB_TOKEN those required
#     checks would simply never run;
#   - the merge step needs the App token for the same reason on the other
#     end: a GITHUB_TOKEN-authored merge-to-main push would not re-trigger
#     this `on: push` workflow, so release-please-action would never get a
#     chance to notice the release PR was merged and cut the tag + GitHub
#     Release that the publish workflow (next slice) listens for.
#
# The app/chart loop (the crux this two-component setup has to get right):
# the app component's release touches only Chart.yaml (its appVersion line)
# -- a file that physically lives under the chart component's path -- so
# without care that commit would look, by path, like a chart-affecting
# commit too. Two things prevent an actual loop:
#   - the app ("." ) package config excludes the chart's directory
#     (`exclude-paths`) so a chart-only commit never counts toward app's own
#     version -- release-please's root/"." package would otherwise pick up
#     every commit in the repo regardless of path;
#   - release-please's own release commits are `chore(...)`-typed, and
#     `chore` is a hidden changelog section by default, so a lone chore
#     commit produces no visible changelog entry for whichever *other*
#     component's path it happens to touch -- release-please skips opening
#     a release PR when there is nothing user-facing to show. This is
#     already the tool's default behavior; don't override
#     `changelog-sections` to un-hide `chore`, or this protection breaks.
#
# Labeling is left on. `skip-labeling: true` was tried initially to avoid
# widening the App's permission set, but release-please-action also uses
# the `autorelease: pending` label *internally* to find its own already-open
# release PR on each run -- not just for this workflow's merge step, which
# only reads the action's own `prs` output. With labeling skipped, every run
# while a release PR is still open failed to find it and tried to open a
# duplicate on the same branch, erroring the whole job before the merge step
# ever ran (observed on `dackota/change-tracking-dashboard` PR #37). Fixed by
# granting the App `issues: write` and dropping `skip-labeling`.
#
# Hardening:
#   - every `uses:` is pinned to a full commit SHA (trailing comment records
#     the version tag);
#   - permissions default to `contents: read` -- both release-please-action
#     and the merge step authenticate with the minted App token, so the
#     workflow's own GITHUB_TOKEN never needs write access;
#   - the merge step always squashes explicitly (`--squash`) rather than
#     relying on the repo's merge-strategy setting, since branch-protection
#     enforcement of squash-only isn't available on this plan (see
#     pr-title-lint.yml's note).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate a token for the dk-renovate-bot App
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Merge each release PR this run touched once its checks are green.
      # `steps.release.outputs.prs` is a JSON array of PullRequest objects
      # (unset/"[]" when nothing was created or updated this run, guarded
      # by the `if:` below and re-checked in-script for defense in depth).
      - name: Auto-merge release PR(s) once CI is green
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          # This job never runs actions/checkout, so there is no local git
          # repo for `gh` to infer the target from -- every `gh pr` call
          # below must be pinned with --repo, or it fails with "fatal: not
          # a git repository" and the script's `if` swallows that as a
          # false "checks didn't pass".

          if [ -z "$PRS_JSON" ] || [ "$PRS_JSON" = "[]" ]; then
            echo "No release PRs created or updated this run; nothing to merge."
            exit 0
          fi

          echo "$PRS_JSON" | jq -c '.[]' | while read -r pr; do
            number=$(echo "$pr" | jq -r '.number')
            title=$(echo "$pr" | jq -r '.title')
            echo "::group::release PR #$number -- $title"

            # pr-ci.yml/pr-title-lint.yml trigger off the `pull_request`
            # event this push just raised; give GitHub a moment to queue
            # them before watching so `checks --watch` doesn't observe an
            # empty check list and return immediately.
            sleep 15

            if gh pr checks "$number" --repo "$GITHUB_REPOSITORY" --watch --fail-fast --interval 20; then
              echo "checks green -- merging #$number"
              if ! gh pr merge "$number" --repo "$GITHUB_REPOSITORY" --squash --delete-branch; then
                echo "::error::merge failed for release PR #$number"
              fi
            else
              echo "::warning::checks did not pass (or timed out) for release PR #$number -- leaving it open; a later push or manual merge will pick it up"
            fi

            echo "::endgroup::"
          done
