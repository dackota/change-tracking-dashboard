apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "change-tracking-dashboard.fullname" . }}-data
  labels:
    {{- include "change-tracking-dashboard.labels" . | nindent 4 }}
spec:
  # ReadWriteOnce: only one node mounts this volume at a time, which is correct
  # for a single-replica deployment with a local SQLite database (US18).
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName }}
  {{- end }}
