apiVersion: v1
kind: Service
metadata:
  name: {{ include "change-tracking-dashboard.fullname" . }}
  labels:
    {{- include "change-tracking-dashboard.labels" . | nindent 4 }}
spec:
  # ClusterIP: the dashboard feed is accessed via kubectl port-forward (US17).
  # No ingress or LoadBalancer is needed.
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "change-tracking-dashboard.selectorLabels" . | nindent 4 }}
