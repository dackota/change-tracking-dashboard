apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "change-tracking-dashboard.fullname" . }}-tracker-config
  labels:
    {{- include "change-tracking-dashboard.labels" . | nindent 4 }}
data:
  # config.yaml: the hot-reloaded tracker configuration.
  # Shape: defaults: (pollIntervalSeconds, backfillDays) + trackers: []
  # Each Tracker entry specifies a repo path and the Extractors (files + fields)
  # whose Tracked fields the poller observes for Changes.
  config.yaml: |
    {{- .Values.trackerConfig | toYaml | nindent 4 }}
