suite: deployment
templates:
  - templates/deployment.yaml
tests:
  - it: should have exactly 1 replica
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should use Recreate strategy to avoid ReadWriteOnce volume deadlock
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set DB_PATH to the PVC mount path (durable SQLite - US18)
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PATH
            value: /data/changes.db

  - it: should set CONFIG_PATH to the tracker ConfigMap mount
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONFIG_PATH
            value: /etc/dashboard/config.yaml

  - it: should set LISTEN_ADDR to :8080
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LISTEN_ADDR
            value: ":8080"

  - it: should expose container port 8080
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 8080
            protocol: TCP

  - it: should run as non-root in pod security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: should run as non-root in container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should have a liveness probe on HTTP port at /
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http

  - it: should have a readiness probe on HTTP port at /
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http

  - it: should mount the tracker ConfigMap volume at /etc/dashboard
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/dashboard
            readOnly: true

  - it: should mount the PVC data volume at /data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
