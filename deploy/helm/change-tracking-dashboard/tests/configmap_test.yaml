suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: should be a ConfigMap
    asserts:
      - isKind:
          of: ConfigMap

  - it: should contain config.yaml key with tracker config
    asserts:
      - isNotNull:
          path: data["config.yaml"]

  - it: should include pollIntervalSeconds from defaults in config.yaml
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "pollIntervalSeconds"
