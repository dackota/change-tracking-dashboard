suite: pvc
templates:
  - templates/pvc.yaml
tests:
  - it: should be a PersistentVolumeClaim
    asserts:
      - isKind:
          of: PersistentVolumeClaim

  - it: should use ReadWriteOnce access mode (single-replica SQLite - US18)
    asserts:
      - contains:
          path: spec.accessModes
          content: ReadWriteOnce

  - it: should request the configured storage size
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi
